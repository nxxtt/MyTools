      - __import__
      - os.system
      - pickle
      - reduce
  - - python_yaml
    - '!!python/object/apply:os.system [id]'
    - - '!!python'
      - object/apply
      - os.system
      - yaml
      - deserialize
  - - python_marshal
    - '\\xe3\\x00\\x00\\x00\\x00\\x00\\x00\\x00\\x00\\x00\\x00\\x00'
