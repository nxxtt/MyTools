      - cmd
      - whoami
      - serialize
  - - php_ref_inject
    - 'a:2:{i:0;R:1;i:1;s:6:"admin";}'
    - - admin
      - 'R:1'
      - reference
      - serialize
  - - php_array_cast
    - 'a:1:{s:4:"user";s:6:"admin";}'
    - - admin
      - user
      - array
      - serialize
  - - php_object_inject
    - 'O:8:"stdClass":1:{s:4:"role";s:5:"admin";}'
    - - admin
      - role
      - stdClass
      - serialize
      - object

