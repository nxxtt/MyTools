  - - base64_wrap
    - TzE6IlVzZXIiOjE6OntzOjQ6Im5hbWUiO3M6NjoiYWRtaW4iO30=
    - - 'O:4'
      - User
      - admin
      - serialize
  - - double_encode
    - 'O%253A4%253A%2522User%2522%253A1%253A'
    - - 'O:4'
