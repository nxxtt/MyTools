detect_payloads:
  - - error_leak
    - 'O:99:"NonExistentClass":0:{}'
    - - NonExistentClass
      - unserialize
      - fatal
      - error
      - class
  - - timing_anomaly
    - 'O:4:"User":1:{s:4:"name";s:6:"admin";}'
    - - admin
      - User
      - object
      - serialize
  - - reflected_data
    - 'O:4:"Test":0:{}'
    - - Test
      - 'O:4'
      - serialize
      - object
  - - type_confusion
    - 'a:0:{}'
    - - 'a:0'
      - array
      - serialize
      - empty
  - - cookie_inject
    - 'O:4:"User":1:{s:4:"role";s:5:"admin";}'
    - - admin
      - role
      - User
      - object
      - serialize

