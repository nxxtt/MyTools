category_map:
  php:
    - php_basic
    - php_pop_chain
    - php_ref_inject
    - php_array_cast
    - php_object_inject
  java:
    - java_magic_bytes
    - java_obj_stream
    - java_gadget_cc
    - java_gadget_spring
    - java_jndi
  python:
    - python_pickle
    - python_reduce
    - python_yaml
